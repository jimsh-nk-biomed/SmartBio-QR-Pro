.orangeBox{

.row{
    display:grid;

}

.label{

}

.value{

}

.hidden{

}

.message{

.footer{

    font-size:12px;
}

#reader{
    width:100%;
    margin-top:15px;
    border-radius:12px;
    overflow:hidden;
}

.statusOK{

}

.statusDue{

@media(max-width:500px){

<script>

/*****************************************************************
 SMARTBIO QR PRO v3.0
 PART 4
 CONFIGURATION & LOGIN
*****************************************************************/

//==================================================
// LICENSE SERVER URL
//==================================================

const API_URL =
"https://script.google.com/macros/s/AKfycbwiS_HydFmZVL4ApcsTP4_A4cwBBTc1KUeQDTyom2cwzOIcXmtydqm9jS7Xh1ymq772/exec";

//==================================================
// GLOBAL VARIABLES
//==================================================

let html5QrCode = null;

let currentEquipment = null;

let currentUser = {};

let currentHospital = {};

let sessionTimer = null;

let autoLogoutMinutes = 30;


//==================================================
// LOGIN
//==================================================

function login(){

    let licenseKey =
    document.getElementById("licenseKey").value.trim();

    let username =
    document.getElementById("username").value.trim();

    let password =
    document.getElementById("password").value.trim();

    if(licenseKey==""){

        showMessage("Enter License Key");

        return;

    }

    if(username==""){

        showMessage("Enter Username");

        return;

    }

    if(password==""){

        showMessage("Enter Password");

        return;

    }

    showMessage("Logging in...");

    let url =
    API_URL
    + "?action=login"
    + "&licenseKey=" + encodeURIComponent(licenseKey)
    + "&username=" + encodeURIComponent(username)
    + "&password=" + encodeURIComponent(password);

    fetch(url)

    .then(response=>response.json())

    .then(data=>{

        console.log(data);

        if(data.status!="VALID"){

            showMessage(data.message);

            return;

        }

        currentUser = {

            username:username,

            department:data.department,

            role:data.role

        };

        currentHospital = {

            hospitalID:data.hospitalID,

            hospitalName:data.hospitalName,

            plan:data.plan,

            installation:data.installation,

            pms:data.pms,

            calibration:data.calibration,

            iq:data.iq,

            oq:data.oq,

            pq:data.pq,

            breakdown:data.breakdown,

            reports:data.reports

        };

        localStorage.setItem(
            "SMARTBIO_LOGIN",
            "YES"
        );

        localStorage.setItem(
            "SMARTBIO_LICENSE",
            licenseKey
        );

        document.getElementById("hospitalName").innerHTML =
        data.hospitalName;

        document.getElementById("loginPage").style.display="none";

        document.getElementById("scannerPage").style.display="block";

        startAutoLogout();

        startScanner();

    })

    .catch(error=>{

        console.log(error);

        showMessage("Unable to connect to server");

    });

}


//==================================================
// MESSAGE
//==================================================

function showMessage(msg){

    document.getElementById("loginMessage").innerHTML = msg;

}


//==================================================
// SHOW PASSWORD
//==================================================

function togglePassword(){

    let p =
    document.getElementById("password");

    if(p.type=="password")

        p.type="text";

    else

        p.type="password";

}
//==================================================
// START QR SCANNER
//==================================================

function startScanner(){

    if(html5QrCode!=null){
        return;
    }

    html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()

    .then(cameras=>{

        if(cameras.length==0){

            alert("No Camera Found");

            return;

        }

        // Use the back camera if available
        let cameraId = cameras[cameras.length-1].id;

        html5QrCode.start(

            cameraId,

            {
                fps:10,
                qrbox:{
                    width:250,
                    height:250
                }
            },

            onScanSuccess,

            function(error){
                // Ignore scan errors
            }

        );

    })

    .catch(err=>{

        alert("Unable to open camera");

        console.log(err);

    });

}



//==================================================
// STOP SCANNER
//==================================================

function stopScanner(){

    if(html5QrCode==null)
        return;

    html5QrCode.stop()

    .then(()=>{

        html5QrCode.clear();

        html5QrCode=null;

    });

}



//==================================================
// QR SUCCESS
//==================================================

//==================================================
// QR SUCCESS
//==================================================

function onScanSuccess(assetNo){

    stopScanner();

    loadEquipment(assetNo);

}//==================================================
// LOAD EQUIPMENT
//==================================================

function loadEquipment(assetNo){

    let licenseKey =
    localStorage.getItem("SMARTBIO_LICENSE");

    let url =
    API_URL
    + "?action=getEquipment"
    + "&licenseKey=" + encodeURIComponent(licenseKey)
    + "&assetNo=" + encodeURIComponent(assetNo);

    fetch(url)

    .then(r=>r.json())

    .then(data=>{

        console.log(data);

        if(data.status!="VALID"){

            alert(data.message);

            return;

        }

        currentEquipment=data;

        document.getElementById("equipmentCard").style.display="block";

        document.getElementById("assetNo").innerHTML=data.assetNo;
        document.getElementById("department").innerHTML=data.department;
        document.getElementById("equipment").innerHTML=data.equipment;
        document.getElementById("model").innerHTML=data.model;
        document.getElementById("make").innerHTML=data.make;
        document.getElementById("serialNo").innerHTML=data.serialNo;

        document.getElementById("pmsDone").innerHTML =
formatDate(data.pmsDone);

document.getElementById("pmsDue").innerHTML =
formatDate(data.pmsDue);

document.getElementById("calDone").innerHTML =
formatDate(data.calibrationDone);

document.getElementById("calDue").innerHTML =
formatDate(data.calibrationDue);

document.getElementById("pmsStatus").innerHTML =
getStatus(data.pmsDue);

document.getElementById("calStatus").innerHTML =
getStatus(data.calibrationDue);

//==================================================
// LICENSE MODULE CONTROL
//==================================================

//==================================================
// MODULE CONTROL
//==================================================

setButtonVisibility("btnInstallation", currentHospital.installation);
setButtonVisibility("btnPMS", currentHospital.pms);
setButtonVisibility("btnCalibration", currentHospital.calibration);

setButtonVisibility("btnIQ", currentHospital.iq);
setButtonVisibility("btnOQ", currentHospital.oq);
setButtonVisibility("btnPQ", currentHospital.pq);
// Installation
document.getElementById("btnInstallation").style.display =
(currentHospital.installation=="YES") ? "inline-block" : "none";

// PMS
document.getElementById("btnPMS").style.display =
(currentHospital.pms=="YES") ? "inline-block" : "none";

// Calibration
document.getElementById("btnCalibration").style.display =
(currentHospital.calibration=="YES") ? "inline-block" : "none";

// IQ
document.getElementById("btnIQ").style.display =
(currentHospital.iq=="YES") ? "inline-block" : "none";

// OQ
document.getElementById("btnOQ").style.display =
(currentHospital.oq=="YES") ? "inline-block" : "none";

// PQ
document.getElementById("btnPQ").style.display =
(currentHospital.pq=="YES") ? "inline-block" : "none";

//=========================================
// DOCUMENT BUTTONS
//=========================================

// Installation
document.getElementById("btnInstallation").onclick = function () {
    openPDF(data.installationPDF);
};

// PMS
document.getElementById("btnPMS").onclick = function () {
    openPDF(data.pmsPDF);
};

// Calibration
document.getElementById("btnCalibration").onclick = function () {
    openPDF(data.calibrationPDF);
};

// IQ
document.getElementById("btnIQ").onclick = function () {
    openPDF(data.iqPDF);
};

// OQ
document.getElementById("btnOQ").onclick = function () {
    openPDF(data.oqPDF);
};

// PQ
document.getElementById("btnPQ").onclick = function () {
    openPDF(data.pqPDF);
};
    })

    .catch(err=>{

        console.log(err);

        alert("Unable to load equipment.");

    });

}



//==================================================
// LOGOUT
//==================================================

function logout(){

    stopScanner();

    localStorage.clear();

    document.getElementById("scannerPage").style.display="none";

    document.getElementById("loginPage").style.display="block";

    document.getElementById("licenseKey").value="";

    document.getElementById("username").value="";

    document.getElementById("password").value="";

    document.getElementById("loginMessage").innerHTML="";

}



//==================================================
// AUTO LOGOUT
//==================================================

function startAutoLogout(){

    if(sessionTimer)
        clearTimeout(sessionTimer);

    sessionTimer = setTimeout(function(){

        alert("Session Expired");

        logout();

    },30*60*1000);

}//=========================================
// FORMAT DATE
//=========================================
//=========================================
// GET STATUS
//=========================================

function getStatus(dateValue){

    if(!dateValue)
        return "N/A";

    let due = new Date(dateValue);

    let today = new Date();

    due.setHours(0,0,0,0);
    today.setHours(0,0,0,0);

    let diff =
    Math.ceil(
    (due-today)/(1000*60*60*24));

    if(diff<0)
        return "🔴 OVERDUE";

    if(diff<=30)
        return "🟡 DUE SOON";

    return "🟢 ACTIVE";

}
function formatDate(dateValue){

    if(!dateValue) return "";

    let d = new Date(dateValue);

    if(isNaN(d)) return dateValue;

    let day = String(d.getDate()).padStart(2,'0');
    let month = String(d.getMonth()+1).padStart(2,'0');
    let year = d.getFullYear();

    return day + "-" + month + "-" + year;

}//=========================================
// OPEN PDF
//=========================================

function openPDF(url){

    if(!url || url.trim()==""){

        alert("Document not available.");

        return;

    }

    // Convert Google Drive link to preview link
    if(url.indexOf("drive.google.com") !== -1){

        let match = url.match(/\/d\/([^\/]+)/);

        if(match){

            url = "https://drive.google.com/file/d/" + match[1] + "/preview";

        }

    }

    window.open(url, "_blank");

}
//==================================================
// SHOW / HIDE BUTTON
//==================================================

function setButtonVisibility(buttonId, permission){

    let btn = document.getElementById(buttonId);

    if(!btn) return;

    if(String(permission).toUpperCase()=="YES"){

        btn.style.display="inline-block";

    }else{

        btn.style.display="none";

    }

}
</script>
